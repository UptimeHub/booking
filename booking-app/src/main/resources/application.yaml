spring:
  application:
    name: booking-app
  config:
    import:
      - optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    producer:
      properties:
        transaction.timeout.ms: ${KAFKA_TRANSACTION_TIMEOUT:60000}
        spring.json.trusted.packages: uz.uptimehub.booking.kafka.dto
      key-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      properties:
        spring.json.trusted.packages: "*"
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      group-id: booking
      isolation-level: read_committed
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      key-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      max-poll-records: 10000

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resource_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:0909}
    driver-class-name: org.postgresql.Driver

springdoc:
  swagger-ui:
    enabled: true
    oauth:
      client-id: frontend-client
      use-pkce-with-authorization-code-grant: true
      scopes: openid profile email

app:
  kafka:
    concurrency: 1
    producers:
      booking-create:
        transaction-id-prefix: tx_booking_create
      booking-failed:
        transaction-id-prefix: tx_booking_failed
      booking-confirmed:
        transaction-id-prefix: tx_booking_confirmed
    topics:
      consume:
        booking-create: ${KAFKA_TOPIC_BOOKING_CREATE:booking.booking-create}
        booking-failed: ${KAFKA_TOPIC_BOOKING_FAILED:booking.booking-failed}
        booking-confirmed: ${KAFKA_TOPIC_BOOKING_CONFIRMED:booking.booking-confirmed}

      produce:
        booking-create: ${KAFKA_TOPIC_BOOKING_CREATED:booking.booking-created}
        booking-failed: ${KAFKA_TOPIC_BOOKING_FAILED:booking.booking-failed}
        booking-confirmed: ${KAFKA_TOPIC_BOOKING_CONFIRMED:booking.booking-confirmed}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 8083

custom-header-names:
  auth:
    permissions:
      "X-Auth-Permissions"
    roles:
      "X-Auth-Roles"
  user:
    id: "X-User-Id"
  organization:
    id: "X-Organization-Id"

services:
  resource:
    url: ${RESOURCE_SERVICE_URL:http://localhost:8082}
