name: Publish Booking API

on:
    push:
        branches:
        - main
        - develop
        paths:
        - "booking-api/**"
        - "pom.xml"
        - ".github/workflows/core-api-publish.yml"

permissions:
    contents: read
    packages: write

jobs:
    publish-booking-api:
        name: Publish Booking API
        uses: UptimeHub/infra/.github/workflows/maven-package-publish.yml@main
        secrets: inherit
        with:
            java-version: '25'
            working-directory: 'booking-api'
            module: '.'
