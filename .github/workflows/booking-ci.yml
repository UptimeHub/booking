name: Booking CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "booking-app/**"
      - "booking-api/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/booking-ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "booking-app/**"
      - "booking-api/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/booking-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  booking-app:
    uses: UptimeHub/infra/.github/workflows/java-service-ci.yml@main
    secrets: inherit
    with:
      java-version: '25'
      working-directory: '.'
      image-name: 'booking'
      dockerfile: './Dockerfile'
      docker-context: '.'
      publish-image: ${{ github.event_name == 'push' }}
      deploy: ${{ github.event_name == 'push' }}
      deploy-container-name: 'booking'
      deploy-image-name: 'ghcr.io/uptimehub/booking'
      deploy-run-options: >-
        --restart unless-stopped
        --network infra_booking-network
        -p 8083:8083
        --env-file /opt/uptimehub/env/booking.env
      deploy-healthcheck-url: http://localhost:8083/actuator/health
      deploy-healthcheck-timeout-seconds: 90
